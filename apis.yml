apis:
  - name: 17TRACK Tracking API
    description: REST API for registering and tracking shipments across 3,300+ global
      carriers with real-time status updates delivered via webhooks. Supports batch
      tracking up to 40 numbers per request with 9 main status categories and 27
      sub-statuses.
